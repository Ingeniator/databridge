services:
  databridge:
    build: .
    ports:
      - "5010:5010"
    environment:
      DATABRIDGE_CONFIG: /app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - export_data:/tmp/databridge-exports
    depends_on:
      - postgres

  databridge-worker:
    build: .
    environment:
      DATABRIDGE_CONFIG: /app/config.yaml
      ROLE: worker
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - export_data:/tmp/databridge-exports
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: databridge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--dir", "/tmp"]
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  export_data:
