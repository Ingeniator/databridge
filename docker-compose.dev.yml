services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: databridge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "8123:8123"   # HTTP interface (used by databridge)
      - "9000:9000"   # native TCP (optional, for clickhouse-client)
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ./dev/init-clickhouse.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--dir", "/tmp"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9200:9000"   # S3 API (9000 offset to avoid clash with clickhouse native port)
      - "9201:9001"   # MinIO web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15

  minio-seed:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/test-media &&
        mc anonymous set download local/test-media &&
        printf 'fake-mp4-content' > /tmp/clip.mp4 &&
        printf 'fake-jpg-content' > /tmp/photo.jpg &&
        printf 'fake-mp3-content' > /tmp/audio.mp3 &&
        mc cp /tmp/clip.mp4  local/test-media/clip.mp4  &&
        mc cp /tmp/photo.jpg local/test-media/photo.jpg &&
        mc cp /tmp/audio.mp3 local/test-media/audio.mp3 &&
        echo 'S3 seed complete'
      "

  dataset-mock:
    build:
      context: ../dataset-mock
    ports:
      - "9101:9100"
    volumes:
      - dataset-mock-uploads:/tmp/mock-dataset-service
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/health')"]
      interval: 5s
      timeout: 3s
      retries: 6
    mem_limit: 128m
    cpus: 0.25

  annotator-mock:
    build:
      context: ../annotator-mock
    ports:
      - "8011:8010"
    environment:
      PORT: "8010"
      ANNOTATION_SPEED: "2"
      LABEL_W_AGREE: "70"
      LABEL_W_DISAGREE: "20"
      LABEL_W_PARTIAL: "10"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 5s
      timeout: 3s
      retries: 6
    mem_limit: 128m
    cpus: 0.25

volumes:
  postgres_data:
  clickhouse_data:
  minio_data:
  dataset-mock-uploads:
